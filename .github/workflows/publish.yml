name: Publish Package

on:
  workflow_dispatch:

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  publish:
    needs: ci
    uses: askrjs/actions/.github/workflows/publish-package.yml@main
    with:
      install-playwright: true
      release-command: npx playwright install --with-deps firefox webkit && npm run check
    permissions:
      contents: write
      id-token: write
      packages: read
    secrets: inherit
